<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Trip Form</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="topnav" id="myTopnav">
      <a href="#" class="active">Home</a>
      <a href="/navbar-html/categories.html">Categories</a>
      <a href="/navbar-html/about.html">About</a>
      <a href="/navbar-html/contact.html">Contact</a>
      <a href="javascript:void(0);" class="icon" onclick="toggleMenu()">
        <i class="fa fa-bars"></i>
      </a>
    </div>
    <form id="myForm" action="/navbar-html/submit-page.html" onsubmit="return validateForm()">
      <h3 type="header">EDUCATION APPOINTMENT FORM</h3>
      <div id="errorContainer" style="color: red; margin-top: 10px"></div>
      <input type="text" placeholder="Title" id="title" name="title" required />
      <input type="text" placeholder="Name" id="name" name="name" required />
      <input type="email" placeholder="Email" id="email" name="email" required />
      <input type="text" placeholder="Phone Number" id="phone" name="phone" required />

      <select id="city" name="city" required>
        <option value="" disabled selected>Select A City</option>
      </select>

      <select id="courseType" name="courseType" required>
        <option value="" disabled selected>Select A Course</option>
      </select>
      <h4 style="font-weight: bold; margin-top: 10px; margin-bottom: 20px">How would you like to be located ?</h4>
      <select id="device" name="device" required>
        <option value="" disabled selected>Select A Device</option>
      </select>
      <select id="timeSlots" name="timeSlots" required>
        <option value="" disabled selected>Select A Timeline</option>
      </select>
      <label>
        <input type="checkbox" name="agree" required />
        I agree to the <span class="terms">Terms and Conditions</span>
      </label>
      <div style="display: flex; justify-content: space-between">
        <input type="submit" value="Register" />
        <input type="reset" value="Reset" />
      </div>
    </form>
    <script src="script.js"></script>
    <script>
      // Fetch data from the mock API for deparaturePoint and destinationPoint dropdowns
      fetch("https://run.mocky.io/v3/6b66dc46-e6f9-467d-bdbd-7a49bc7455ef")
        .then((response) => response.json())
        .then((data) => {
          const cityDropdown = document.getElementById("city");
          const courseDropdown = document.getElementById("courseType");

          data.cities.forEach((city) => {
            const option = document.createElement("option");
            option.value = city;
            option.text = city;
            cityDropdown.appendChild(option);
          });

          // Populate Course Type dropdown
          data.courseTypes.forEach((courseType) => {
            const option = document.createElement("option");
            option.value = courseType;
            option.text = courseType;
            courseDropdown.appendChild(option);
          });
        })

        .catch((error) => console.error("Error fetching data:", error));

      fetch("https://run.mocky.io/v3/d1c29e71-380f-4142-86f7-cf3fa5705a95")
        .then((response) => response.json())
        .then((data) => {
          const deviceDropdown = document.getElementById("device");
          const timelineDropdown = document.getElementById("timeSlots");

          data.devices.forEach((device) => {
            const option = document.createElement("option");
            option.value = device;
            option.text = device;
            deviceDropdown.appendChild(option);
          });
          data.timeline.forEach((device) => {
            const option = document.createElement("option");
            option.value = device;
            option.text = device;
            timelineDropdown.appendChild(option);
          });
        })
        .catch((error) => console.error("Error fetching data:", error));
    </script>
  </body>
</html>
