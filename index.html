<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Trip Form</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="topnav" id="myTopnav">
      <a href="#" class="active">Home</a>
      <a href="/navbar-html/categories.html">Categories</a>
      <a href="/navbar-html/about.html">About</a>
      <a href="/navbar-html/contact.html">Contact</a>
      <a href="javascript:void(0);" class="icon" onclick="toggleMenu()">
        <i class="fa fa-bars"></i>
      </a>
    </div>
    <form id="myForm" action="submit-page.html" onsubmit="return validateForm()">
      <h3 type="header">TRIP REGISTRATION FORM</h3>
      <input type="text" placeholder="Name" id="name" name="name" required />
      <input type="text" placeholder="Email" id="email" name="email" required />
      <input type="text" placeholder="Phone Number" id="phone" name="phone" required />
      <input type="text" placeholder="Address" id="address" name="address" required />
      <select id="deparaturePoint" name="deparaturePoint" required>
        <option value="" disabled selected>Select Departure Point</option>
      </select>

      <select id="destinationPoint" name="destinationPoint" required>
        <option value="" disabled selected>Select Destination Point</option>
      </select>
      <h4 style="font-weight: bold; margin-top: 10px; margin-bottom: 20px">
        Which vehicle would you like to travel by ?
      </h4>
      <select id="vehicle" name="vehicle" required>
        <option value="" disabled selected>Select a Vehicle</option>
      </select>
      <h4 style="font-weight: bold; margin-top: 10px; margin-bottom: 20px">What is your preferred travel date ?</h4>
      <div style="margin-top: 24px; margin-bottom: 8px">
        <div
          style="
            display: flex;
            flex-direction: row;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
          "
        >
          <label class="checkIn" for="date">Check-in Date:</label>
          <input type="date" id="date" name="date" required pattern="\d{1,2}/\d{1,2}/\d{2}" />
        </div>
        <div style="display: flex; justify-content: space-between; flex-direction: row">
          <label class="checkOut" for="date">Check-out Date:</label>
          <input type="date" id="date" name="date" required pattern="\d{1,2}/\d{1,2}/\d{2}" />
        </div>
      </div>

      <label>
        <input type="checkbox" name="agree" required />
        I agree to the <span class="terms">Terms and Conditions</span>
      </label>
      <div style="display: flex; justify-content: space-between">
        <input type="submit" value="Request An Appointment" />
        <input type="reset" value="Reset" />
      </div>
    </form>
    <script src="script.js"></script>
    <script>
      // Fetch data from the mock API for City and Course Type dropdowns
      fetch("https://run.mocky.io/v3/21a8145c-6b78-4edf-80e6-6c63b6c7abd2")
        .then((response) => response.json())
        .then((data) => {
          const deparaturePoint = document.getElementById("deparaturePoint");
          const destinationPoint = document.getElementById("destinationPoint");

          data.cities.forEach((city) => {
            const option = document.createElement("option");
            option.value = city;
            option.text = city;
            deparaturePoint.appendChild(option);
          });

          // Populate Course Type dropdown
          data.cities.forEach((courseType) => {
            const option = document.createElement("option");
            option.value = courseType;
            option.text = courseType;
            destinationPoint.appendChild(option);
          });
        })

        .catch((error) => console.error("Error fetching data:", error));

      fetch("https://run.mocky.io/v3/61ab30de-9f57-453b-bb4a-cd07b81ad634")
        .then((response) => response.json())
        .then((data) => {
          const vehicleType = document.getElementById("vehicle");

          data.vehicleTypes.forEach((device) => {
            const option = document.createElement("option");
            option.value = device;
            option.text = device;
            vehicleType.appendChild(option);
          });
        })
        .catch((error) => console.error("Error fetching data:", error));
    </script>
  </body>
</html>
