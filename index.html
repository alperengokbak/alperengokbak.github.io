<!DOCTYPE html>
<html lang="en">
  <head>
    <title>EDU Form</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="topnav" id="myTopnav">
      <a href="#" class="active">Home</a>
      <a href="categories.html">Categories</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="javascript:void(0);" class="icon" onclick="toggleMenu()">
        <i class="fa fa-bars"></i>
      </a>
    </div>
    <form id="myForm" action="submit-page.html" onsubmit="return validateForm()">
      <h3 type="header">EDUCATION APPOINTMENT FORM</h3>
      <label for="name">Title:</label>
      <input type="text" placeholder="Title" id="title" name="title" required />
      <label for="name">Name:</label>
      <input type="text" placeholder="Name" id="name" name="name" required />
      <label for="email">Email:</label>
      <input type="text" placeholder="Email" id="email" name="email" required />
      <label for="phone">Phone:</label>
      <input type="text" placeholder="Phone Number" id="phone" name="phone" required />
      <label for="city">City:</label>
      <select id="city" name="city" required>
        <option value="" disabled selected>Select a city</option>
      </select>
      <label for="courseType">Course Type:</label>
      <select id="courseType" name="courseType" required>
        <option value="" disabled selected>Select a course type</option>
      </select>
      <h4 style="font-weight: bold; margin-top: 10px; margin-bottom: 20px">How would you like to be located ?</h4>
      <select id="device" name="device" required>
        <option value="" disabled selected>Select a platform</option>
      </select>
      <select id="timeSlot" name="timeSlot" required>
        <option value="" disabled selected>Select a timeline</option>
      </select>
      <label>
        <input type="checkbox" name="agree" required />
        I agree to the terms and conditions
      </label>
      <input type="submit" value="Request An Appointment" />
    </form>
    <script src="script.js"></script>
    <script>
      // Fetch data from the mock API for City and Course Type dropdowns
      fetch("https://run.mocky.io/v3/21a8145c-6b78-4edf-80e6-6c63b6c7abd2")
        .then((response) => response.json())
        .then((data) => {
          const cityDropdown = document.getElementById("city");
          const courseTypeDropdown = document.getElementById("courseType");

          // Populate City dropdown
          data.cities.forEach((city) => {
            const option = document.createElement("option");
            option.value = city;
            option.text = city;
            cityDropdown.appendChild(option);
          });

          // Populate Course Type dropdown
          data.courseTypes.forEach((courseType) => {
            const option = document.createElement("option");
            option.value = courseType;
            option.text = courseType;
            courseTypeDropdown.appendChild(option);
          });
        })
        .catch((error) => console.error("Error fetching data:", error));

      fetch("https://run.mocky.io/v3/12dde335-6d50-4afc-b77a-e34adbe9ab98")
        .then((response) => response.json())
        .then((data) => {
          const deviceDropdown = document.getElementById("device");
          const timeSlotDropdown = document.getElementById("timeSlot");

          data.devices.forEach((device) => {
            const option = document.createElement("option");
            option.value = device;
            option.text = device;
            deviceDropdown.appendChild(option);
          });

          data.timeSlots.forEach((timeSlot) => {
            const option = document.createElement("option");
            option.value = timeSlot;
            option.text = timeSlot;
            timeSlotDropdown.appendChild(option);
          });
        })
        .catch((error) => console.error("Error fetching data:", error));
    </script>
  </body>
</html>
