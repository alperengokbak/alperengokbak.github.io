<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Azure DevOps and Terraform project cover">
  <defs>
    <linearGradient id="bg-azdo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow-azdo" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid-azdo" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="600" height="360" fill="url(#bg-azdo)"/>
  <rect width="600" height="360" fill="url(#grid-azdo)"/>
  <ellipse cx="300" cy="180" rx="280" ry="160" fill="url(#glow-azdo)"/>

  <g transform="translate(300 160)">
    <g transform="translate(-130 -50)">
      <rect x="0" y="0" width="120" height="120" rx="20" fill="#0f172a" stroke="#0078d4" stroke-width="1.5" stroke-opacity="0.7"/>
      <g transform="translate(60 60)">
        <path d="M -26 -20 L 14 -20 L 26 0 L 14 20 L -26 20 Z" fill="#0078d4"/>
        <circle cx="-6" cy="0" r="6" fill="#ffffff"/>
        <path d="M -6 -16 L -6 -8 M -6 8 L -6 16 M -16 0 L -22 0" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
      </g>
      <text x="60" y="105" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0" letter-spacing="1.5">AZURE DEVOPS</text>
    </g>
    <g transform="translate(10 -50)">
      <rect x="0" y="0" width="120" height="120" rx="20" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.7"/>
      <g transform="translate(60 60)">
        <polygon points="-22,-26 0,-13 0,13 -22,0" fill="#5c4ee5"/>
        <polygon points="0,-13 22,-26 22,0 0,13" fill="#7c3aed"/>
        <polygon points="-22,3 0,16 0,42 -22,29" fill="#a78bfa"/>
        <polygon points="0,16 22,3 22,29 0,42" fill="#8b5cf6"/>
      </g>
      <text x="60" y="105" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0" letter-spacing="2">TERRAFORM</text>
    </g>
  </g>

  <text x="300" y="290" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#f8fafc">Azure DevOps · Terraform</text>
  <text x="300" y="316" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#93c5fd" letter-spacing="3">CI/CD &amp; IaC PIPELINES</text>
</svg>
